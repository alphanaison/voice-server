<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Call App</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:20px;">

<h2>📞 Voice Call System</h2>

<input id="myId" placeholder="Your name (alpha)" />
<input id="targetId" placeholder="Call user (beta)" />

<br><br>

<button onclick="register()">Register</button>
<button onclick="startCall()">Call</button>
<button onclick="answerCall()">Answer</button>
<button onclick="hangUp()">Hang Up</button>

<p id="status">Loading...</p>
<pre id="log" style="text-align:left;max-height:200px;overflow:auto;"></pre>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
// 🔥 SAFE START
window.onerror = function(err){
  document.body.innerHTML += "<p style='color:red;'>CRASH: "+err+"</p>";
};

// CONFIG
const SERVER = "wss://voice-server-s87r.onrender.com";

// STATE
let ws = null;
let pc = null;
let myId = null;
let targetId = null;
let callId = null;
let incoming = null;
let localStream = null;

// DEVICE ID
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = Math.random().toString(36).slice(2);
  localStorage.setItem("deviceId", deviceId);
}

// UI
const logEl = document.getElementById("log");
const statusEl = document.getElementById("status");

function log(msg){
  console.log(msg);
  logEl.innerText += msg + "\n";
}

function setStatus(msg){
  statusEl.innerText = msg;
}

// CONNECT
function connect(){
  log("Connecting...");

  ws = new WebSocket(SERVER);

  ws.onopen = () => {
    log("✅ Connected");
    setStatus("Connected");
  };

  ws.onerror = () => {
    log("❌ WS Error");
    setStatus("Connection error");
  };

  ws.onclose = () => {
    log("⚠️ Disconnected");
  };

  ws.onmessage = async (e) => {
    try {
      const data = JSON.parse(e.data);
      log(JSON.stringify(data));

      if(data.type === "incoming"){
        incoming = data;
        callId = data.callId;
        setStatus("📞 Incoming call from " + data.from);
      }

      if(data.type === "answer"){
        await pc.setRemoteDescription(data.payload.answer);
        setStatus("In call 🎧");
      }

      if(data.type === "ice"){
        await pc.addIceCandidate(data.payload.candidate);
      }

      if(data.type === "hangup"){
        cleanup();
        setStatus("Call ended");
      }

    } catch(err){
      log("ERR: " + err);
    }
  };
}

// REGISTER
function register(){
  myId = document.getElementById("myId").value;

  ws.send(JSON.stringify({
    type:"register",
    from: myId,
    deviceId
  }));

  setStatus("Registered as " + myId);
}

// PEER
function createPeer(){
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  pc.ontrack = (e) => {
    const audio = document.getElementById("remoteAudio");
    audio.srcObject = e.streams[0];
    audio.play().catch(()=>{});
  };

  pc.onicecandidate = (e) => {
    if(e.candidate){
      ws.send(JSON.stringify({
        type:"ice",
        from: myId,
        to: targetId,
        callId,
        deviceId,
        payload:{ candidate: e.candidate }
      }));
    }
  };
}

// CALL
async function startCall(){
  targetId = document.getElementById("targetId").value;

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({
    type:"call",
    from: myId,
    to: targetId,
    deviceId,
    payload:{ offer }
  }));

  setStatus("Calling...");
}

// ANSWER
async function answerCall(){
  if(!incoming) return;

  targetId = incoming.from;
  callId = incoming.callId;

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  await pc.setRemoteDescription(incoming.payload.offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  ws.send(JSON.stringify({
    type:"answer",
    from: myId,
    to: targetId,
    callId,
    deviceId,
    payload:{ answer }
  }));

  setStatus("In call 🎧");
}

// HANGUP
function hangUp(){
  if(!callId) return;

  ws.send(JSON.stringify({
    type:"hangup",
    from: myId,
    to: targetId,
    callId,
    deviceId
  }));

  cleanup();
}

// CLEANUP
function cleanup(){
  if(pc) pc.close();
  if(localStream) localStream.getTracks().forEach(t=>t.stop());

  pc = null;
  localStream = null;
  incoming = null;
  callId = null;
}

// START
connect();
</script>

</body>
</html>
