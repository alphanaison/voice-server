<script>
const SERVER = "wss://voice-server-s87r.onrender.com";

let ws;
let pc;
let myId;
let targetId;
let incoming = null;
let callId = null;
let localStream = null;

// DEVICE ID (persistent)
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = Math.random().toString(36).slice(2);
  localStorage.setItem("deviceId", deviceId);
}

function log(msg){
  console.log(msg);
  document.getElementById("log").innerText += msg + "\n";
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

// CONNECT
function connect(){
  ws = new WebSocket(SERVER);

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    log(JSON.stringify(data));

    if(data.type === "incoming"){
      incoming = data;
      callId = data.callId;
      setStatus("📞 Incoming call from " + data.from);
    }

    if(data.type === "answer"){
      await pc.setRemoteDescription(data.payload.answer);
      setStatus("In call 🎧");
    }

    if(data.type === "ice"){
      await pc.addIceCandidate(data.payload.candidate);
    }

    if(data.type === "hangup"){
      cleanup();
      setStatus("Call ended");
    }
  };
}

connect();

// REGISTER
function register(){
  myId = document.getElementById("myId").value;

  ws.send(JSON.stringify({
    type:"register",
    from: myId,
    deviceId
  }));

  setStatus("Registered");
}

// PEER
function createPeer(){
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  pc.ontrack = (e) => {
    const audio = document.getElementById("remoteAudio");
    audio.srcObject = e.streams[0];
    audio.play().catch(()=>{});
  };

  pc.onicecandidate = (e) => {
    if(e.candidate){
      ws.send(JSON.stringify({
        type:"ice",
        from: myId,
        to: targetId,
        callId,
        deviceId,
        payload:{ candidate: e.candidate }
      }));
    }
  };
}

// CALL
async function startCall(){
  targetId = document.getElementById("targetId").value;

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  callId = Math.random().toString(36).slice(2);

  ws.send(JSON.stringify({
    type:"call",
    from: myId,
    to: targetId,
    callId,
    deviceId,
    payload:{ offer }
  }));

  setStatus("Calling...");
}

// ANSWER
async function answerCall(){
  if(!incoming) return;

  targetId = incoming.from;

  createPeer();

  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  await pc.setRemoteDescription(incoming.payload.offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  ws.send(JSON.stringify({
    type:"answer",
    from: myId,
    to: targetId,
    callId,
    deviceId,
    payload:{ answer }
  }));

  setStatus("In call 🎧");
}

// HANGUP
function hangUp(){
  ws.send(JSON.stringify({
    type:"hangup",
    from: myId,
    to: targetId,
    callId,
    deviceId
  }));

  cleanup();
}

function cleanup(){
  if(pc) pc.close();
  if(localStream) localStream.getTracks().forEach(t=>t.stop());

  pc = null;
  localStream = null;
  incoming = null;
  callId = null;
}
</script>
